% bblopts.cfg — workaround for babel versions that don't recognize es-tabla
% as a language attribute (new babel locale mechanism vs old spanish.ldf).
% In old babel with spanish.ldf, es-tabla was a valid attribute that set
% table caption names. New babel handles this automatically; declaring
% es-tabla as a no-op option prevents the "Unknown option" error.
\DeclareOption{es-tabla}{}
